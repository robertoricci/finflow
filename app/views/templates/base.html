<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FinFlow{% endblock %} — Controle Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --bg2: #13161e;
      --bg3: #1a1e29;
      --bg4: #222636;
      --border: #2a2f3f;
      --text: #e8eaf0;
      --text2: #9097b0;
      --text3: #5a6080;
      --accent: #4f7cff;
      --accent-glow: rgba(79,124,255,0.18);
      --green: #22c55e;
      --green-glow: rgba(34,197,94,0.15);
      --red: #f43f5e;
      --red-glow: rgba(244,63,94,0.15);
      --yellow: #f59e0b;
      --yellow-glow: rgba(245,158,11,0.15);
      --teal: #14b8a6;
      --purple: #a78bfa;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --sidebar-w: 260px;
      --topbar-h: 64px;
      --transition: 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ─── TOAST ─────────────────────────────── */
    #toast-container {
      position: fixed; top: 80px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border-radius: var(--radius-sm);
      background: var(--bg3); border: 1px solid var(--border);
      font-size: 14px; font-weight: 500; min-width: 280px;
      box-shadow: var(--shadow); animation: slideIn .3s ease;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.danger  { border-left: 3px solid var(--red); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }

    /* ─── MODAL ──────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; width: 100%;
      max-width: 520px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; border-radius: 6px; transition: var(--transition); }
    .modal-close:hover { background: var(--bg4); color: var(--text); }

    /* ─── FORM ELEMENTS ──────────────────────── */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
    .form-control {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 14px; transition: var(--transition);
    }
    .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-control::placeholder { color: var(--text3); }
    select.form-control option { background: var(--bg3); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    /* ─── BUTTONS ─────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: var(--transition); white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3d6aee; box-shadow: 0 0 16px var(--accent-glow); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #e11d48; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { padding: 8px; border-radius: var(--radius-sm); background: var(--bg3); border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: var(--transition); }
    .btn-icon:hover { background: var(--bg4); color: var(--text); }

    /* ─── BADGE ───────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .badge-green { background: var(--green-glow); color: var(--green); }
    .badge-red   { background: var(--red-glow);   color: var(--red); }
    .badge-blue  { background: var(--accent-glow); color: var(--accent); }
    .badge-yellow{ background: var(--yellow-glow); color: var(--yellow); }

    /* ─── RADIO TABS ─────────────────────────── */
    .radio-tabs { display: flex; gap: 6px; background: var(--bg3); padding: 5px; border-radius: var(--radius-sm); }
    .radio-tab { flex: 1; text-align: center; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition); color: var(--text2); }
    .radio-tab.active { background: var(--accent); color: #fff; }
    .radio-tab.income.active { background: var(--green); }
    .radio-tab.expense.active { background: var(--red); }

    /* ─── LOADING ─────────────────────────────── */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    {% block extra_style %}{% endblock %}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <div id="toast-container"></div>

  <script>
    lucide.createIcons();

    // Toast system
    function showToast(msg, type='info', duration=3500) {
      const icons = { success: 'check-circle', danger: 'x-circle', info: 'info' };
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<i data-lucide="${icons[type]||'info'}" style="width:16px;height:16px;flex-shrink:0"></i><span>${msg}</span>`;
      document.getElementById('toast-container').appendChild(el);
      lucide.createIcons();
      setTimeout(() => el.style.animation = 'slideIn .3s ease reverse', duration - 300);
      setTimeout(() => el.remove(), duration);
    }

    // Flash messages from server
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        setTimeout(() => showToast("{{ msg|e }}", "{{ cat }}"), 200);
      {% endfor %}
    {% endwith %}

    // Format currency BRL
    function fmt(n) {
      return new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' }).format(n || 0);
    }
    function fmtDate(s) {
      if (!s) return '';
      return s; // already dd/mm/yyyy from backend
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
