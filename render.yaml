services:
  - type: web
    name: finflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash render_entrypoint.sh
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: defaultdb
          property: connectionString

databases:
  - name: defaultdb
    databaseName: defaultdb
    user: avnadmin
    plan: free
